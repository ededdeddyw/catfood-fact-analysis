name: Deploy site to GitHub Pages

# site/ 配下の静的サイトを GitHub Pages へ公開する。
# 事前にリポジトリ Settings > Pages で Source = "GitHub Actions" を選ぶこと。
# （プライベートリポジトリで Pages を使うには GitHub Pro/Team が必要。
#   無料で公開するならリポジトリを public にする。）

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
